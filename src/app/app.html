<div class="page">
  <aside class="panel">
    <div class="panel-head">
      <div>
        <h2>Ruta</h2>
        <p class="muted">Calcula distancia y tiempo con mapa interactivo.</p>
      </div>
    </div>

    <div class="form">
      <!-- Origen -->
      <div class="row">
        <div class="field">
          <label>Origen</label>
          <div class="input">
            <span class="pin pin--origin">●</span>
            <input #originInput type="text" placeholder="Escribe un lugar..." />
          </div>
        </div>

        <button
          class="swap"
          type="button"
          (click)="swapLocations()"
          [disabled]="!origin && !destination"
          title="Invertir origen y destino"
          aria-label="Invertir origen y destino"
        >
          ↕
        </button>
      </div>

      <!-- Destino -->
      <div class="field">
        <label>Destino</label>
        <div class="input">
          <span class="pin pin--dest">📍</span>
          <input #destInput type="text" placeholder="Elige un lugar de destino..." />
        </div>
      </div>

      <!-- Modos -->
      <div class="modes">
        <button (click)="setMode('DRIVING')" [class.active]="travelMode==='DRIVING'">Auto</button>
        <button (click)="setMode('WALKING')" [class.active]="travelMode==='WALKING'">Caminando</button>
        <button (click)="setMode('BICYCLING')" [class.active]="travelMode==='BICYCLING'">Bici</button>
        <button (click)="setMode('TRANSIT')" [class.active]="travelMode==='TRANSIT'">Transporte</button>
      </div>

      <!-- Resultado -->
      <section class="stats">
        <div class="stat">
          <div class="k">Distancia</div>
          <div class="v">{{ distanceText || '-' }}</div>
        </div>
        <div class="stat">
          <div class="k">Tiempo</div>
          <div class="v">{{ durationText || '-' }}</div>
        </div>

        <div class="tip">
          Tip: puedes elegir origen/destino con clic en el mapa (1er clic origen, 2do destino).
        </div>
      </section>

      <div class="footer">
        <button class="ghost" type="button" (click)="clear()">Limpiar</button>
      </div>
    </div>
  </aside>

  <main class="map-wrap">
    <google-map
      height="100%"
      width="100%"
      [center]="center"
      [zoom]="zoom"
      (mapClick)="onMapClick($event)"
    >
      <map-marker *ngIf="origin" [position]="origin" label="A"></map-marker>
      <map-marker *ngIf="destination" [position]="destination" label="B"></map-marker>

      <map-directions-renderer
        *ngIf="directionsResult"
        [directions]="directionsResult"
      ></map-directions-renderer>
    </google-map>
  </main>
</div>
